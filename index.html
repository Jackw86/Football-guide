<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#16a34a"><title>Your Football Guide</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#fafafa;--card:rgba(255,255,255,.85);--border:rgba(0,0,0,.06);--text:#18181b;--muted:#71717a;--accent:#16a34a;--success:#16a34a;--danger:#dc2626;--r:14px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
#app{height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideL{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideR{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideD{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes confF{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(22,163,74,.3)}50%{box-shadow:0 0 20px rgba(22,163,74,.6)}}
.hdr{padding:8px 14px;display:flex;align-items:center;gap:8;background:rgba(255,255,255,.8);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.hb{cursor:pointer;border:none;background:var(--accent);color:#fff;border-radius:10px;padding:6px 10px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:11px;display:flex;align-items:center;gap:4;box-shadow:0 2px 8px rgba(22,163,74,.25)}.hb:active{transform:scale(.95)}
.ht{flex:1;text-align:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:11px;color:var(--muted)}
.hpr{position:relative;width:34px;height:34px;flex-shrink:0}.hpr svg{width:34px;height:34px}.hpr .l{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:9px;font-family:'Space Grotesk',sans-serif}
.gc{background:var(--card);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ov{position:absolute;inset:0;z-index:100}.ob{position:absolute;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(4px)}
.np{position:relative;z-index:1;background:#fff;border-radius:0 0 20px 20px;max-height:85dvh;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,.15);animation:slideD .2s}
.nl{padding:6px 10px 14px;display:flex;flex-direction:column;gap:3px}
.ni{cursor:pointer;border:none;border-radius:10px;text-align:left;padding:9px 12px;font-family:'Nunito',sans-serif}.ni:active{transform:scale(.97)}.ni.lk{opacity:.25;pointer-events:none}
.nr{display:flex;align-items:center;gap:8;font-weight:800;font-size:11px}
.ct{flex:1;overflow-y:auto;padding:14px 12px 100px}.ct::-webkit-scrollbar{width:0}
.sl-l .gc,.sl-l .chd{animation:slideL .3s}.sl-r .gc,.sl-r .chd{animation:slideR .3s}
.chd{border-radius:var(--r);padding:20px 16px;margin-bottom:12px;color:#fff;position:relative;overflow:hidden}
.chd .bg{position:absolute;top:-10px;right:-10px;font-size:64px;opacity:.12;transform:rotate(12deg)}.chd .n{font-family:'Space Grotesk',sans-serif;font-size:9px;font-weight:700;opacity:.7;text-transform:uppercase;letter-spacing:2px;margin-bottom:3px}.chd .t{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;line-height:1.2;margin-bottom:2px}.chd .s{font-size:11px;opacity:.85;font-weight:600}
.intro{font-size:12.5px;line-height:1.65;font-weight:600;color:#444;border-left:3px solid;padding-left:12px}
.bt{font-size:12px;line-height:1.65;font-weight:500;color:#444;margin-bottom:3px}.bt b{color:#111;font-weight:800}.bt u{text-decoration:none;color:#16a34a;font-weight:700}
.stl{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;margin-bottom:6px;display:flex;align-items:center;gap:5}
.badge{font-size:9px;font-family:'Nunito',sans-serif;font-weight:700;padding:2px 6px;border-radius:20px}
.step{display:flex;align-items:flex-start;gap:8px;padding:7px 8px;border-radius:8px;cursor:pointer;margin-bottom:2px}.step:active{transform:scale(.98)}
.chk{width:18px;height:18px;border-radius:5px;flex-shrink:0;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:900;margin-top:1px}
.stxt{font-size:11px;font-weight:600;line-height:1.4}.stxt.dn{color:#aaa;text-decoration:line-through}
.fact{border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:9px}.fact .ico{font-size:20px;flex-shrink:0}.fact .lb{font-family:'Space Grotesk',sans-serif;font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:1px}.fact .tx{font-size:11px;font-weight:700;line-height:1.35}
.drill{cursor:pointer;border-radius:8px;padding:8px 10px;font-family:inherit;font-size:10px;font-weight:700;text-align:left;width:100%;display:flex;align-items:center;gap:7px;margin-bottom:4px;border:1.5px solid}.drill:active{transform:scale(.98)}
.qbox{border-radius:var(--r);padding:14px;margin-bottom:10px;border:2px solid;background:var(--card)}
.qq{font-weight:800;font-size:11.5px;margin:10px 0 4px;color:var(--text)}
.qa{cursor:pointer;border:1.5px solid #e4e4e7;border-radius:8px;padding:9px 11px;margin-bottom:4px;font-size:11px;font-weight:700;transition:all .15s}.qa:active{opacity:.8}
.qa.ok{background:#dcfce7;border-color:var(--success);color:#166534;pointer-events:none}
.qa.no{background:#fee2e2;border-color:var(--danger);color:#991b1b;pointer-events:none}
.qa.ds{pointer-events:none;opacity:.3}
.typebox{margin:6px 0 10px;display:flex;gap:6px}.typebox input{flex:1;border:2px solid var(--danger);border-radius:8px;padding:8px 10px;font-family:inherit;font-size:11px;font-weight:600}.typebox button{border:none;background:var(--accent);color:#fff;border-radius:8px;padding:8px 12px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:10px;cursor:pointer}
.deep{border-radius:var(--r);padding:14px;margin-bottom:10px;border:2px solid #86efac;background:linear-gradient(135deg,#f0fdf4,#dcfce7)}.deep .dtl{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;color:#166534;margin-bottom:8px}.deep .q{font-size:11px;font-weight:700;color:#14532d;margin-bottom:4px;line-height:1.4}.deep textarea{width:100%;border:1.5px solid #86efac;border-radius:8px;padding:8px;font-family:inherit;font-size:11px;min-height:60px;margin-bottom:6px;resize:vertical}.deep .saved{font-size:9px;color:var(--success);font-weight:700}
.trigger{background:linear-gradient(135deg,#fef3c7,#fde68a);border:1.5px solid #f59e0b;border-radius:10px;padding:10px 12px;margin-bottom:8px}.trigger .lb{font-family:'Space Grotesk',sans-serif;font-size:8px;font-weight:700;color:#92400e;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}.trigger .tx{font-size:11px;font-weight:700;color:#78350f;line-height:1.4}
.bn{position:absolute;bottom:0;left:0;right:0;padding:6px 12px 12px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to top,rgba(250,250,250,.98) 60%,transparent);z-index:10}
.ar{cursor:pointer;border:none;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;box-shadow:0 2px 8px rgba(0,0,0,.08);color:#fff}.ar:active{transform:scale(.9)}.ar:disabled{opacity:.25}
.dots{display:flex;gap:2px;align-items:center;flex-wrap:wrap;justify-content:center;max-width:55%}.d{height:5px;border-radius:3px;border:none;cursor:pointer}
.conf{position:fixed;width:8px;height:8px;top:-10px;z-index:200;border-radius:2px;animation:confF 2.5s ease-out forwards;pointer-events:none}
.home{padding:16px 12px}.hello{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:24px;color:var(--text)}.sub{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:14px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}.gcard{cursor:pointer;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:14px 10px;text-align:center}.gcard:active{transform:scale(.96)}.gcard .em{font-size:28px;margin-bottom:3px}.gcard .nm{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:11px}.gcard .ds{font-size:9px;color:var(--muted);font-weight:600;margin-top:2px}
.goal-frame{position:relative;width:100%;height:200px;background:linear-gradient(180deg,#87CEEB,#4ade80);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.goal-net{position:absolute;top:20px;left:15%;width:70%;height:100px;border:4px solid #fff;border-bottom:none;background:repeating-linear-gradient(90deg,transparent,transparent 10px,rgba(255,255,255,.15) 10px,rgba(255,255,255,.15) 11px),repeating-linear-gradient(0deg,transparent,transparent 10px,rgba(255,255,255,.15) 10px,rgba(255,255,255,.15) 11px)}
.goal-zone{position:absolute;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:rgba(255,255,255,.6);border:1px dashed rgba(255,255,255,.3);transition:all .15s}.goal-zone:active{background:rgba(255,255,255,.3)}
.goal-zone.scored{background:rgba(22,163,74,.4);border-color:#16a34a;color:#fff}.goal-zone.saved{background:rgba(220,38,38,.4);border-color:#dc2626;color:#fff}
.keeper{position:absolute;font-size:28px;transition:left .3s,top .3s}
.offside-pitch{position:relative;width:100%;height:240px;background:linear-gradient(0deg,#22c55e 0%,#16a34a 50%,#22c55e 100%);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.offside-pitch .line{position:absolute;left:0;right:0;border-top:2px dashed rgba(255,255,255,.5)}.offside-pitch .player{position:absolute;font-size:20px;text-shadow:0 1px 3px rgba(0,0,0,.3)}
.streak-box{display:flex;align-items:center;gap:10px;margin-bottom:10px}.streak-n{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:28px;color:var(--danger)}.streak-i{font-size:10px;font-weight:600;color:var(--muted);line-height:1.4}.streak-b{cursor:pointer;border:none;background:var(--success);color:#fff;border-radius:8px;padding:8px 14px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:11px;margin-left:auto}.streak-b:active{transform:scale(.95)}.streak-b.dn{background:#d4d4d8;color:#a1a1aa}
.capy{background:linear-gradient(135deg,#fef3c7,#fbbf24);border:3px solid #f59e0b;border-radius:18px;padding:18px;margin-bottom:12px;text-align:center;animation:pop .5s}.capy .em{font-size:52px;animation:float 3s ease-in-out infinite}.capy h2{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;color:#92400e;margin:6px 0 2px}.capy p{font-size:11px;color:#a16207;font-weight:600}
.srow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f4f4f5}.srow:last-child{border:none}.slb{font-size:11px;font-weight:600;color:var(--muted)}.svl{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px}
.name-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:20px;text-align:center;background:linear-gradient(135deg,#f0fdf4,#dcfce7)}
.name-screen h1{font-family:'Space Grotesk',sans-serif;font-size:28px;color:var(--accent)}.name-screen input{border:2px solid var(--accent);border-radius:12px;padding:12px 16px;font-size:16px;font-family:inherit;font-weight:700;text-align:center;width:80%;max-width:300px;margin:16px 0}.name-screen button{border:none;background:var(--accent);color:#fff;border-radius:12px;padding:12px 24px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;cursor:pointer}.name-screen button:active{transform:scale(.95)}
.log-entry textarea{width:100%;border:1.5px solid #d4d4d8;border-radius:8px;padding:8px;font-family:inherit;font-size:11px;min-height:50px;margin-bottom:6px;resize:vertical}
.log-past{font-size:10px;color:var(--muted);font-weight:600;line-height:1.5;margin-top:4px;padding:8px;background:#f4f4f5;border-radius:8px}
</style>
</head><body><div id="app"></div>
<script src="data.js"></script>
<script>
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
let V='name',ac=0,cs={},dd={},sn=0,qa={},passed={},sp=0,sDir='l',userName='';
let streak={c:0,l:'',b:0},sBest=Infinity,deepA={},tLog=[],wrongT={};
let gS={},penScore=0,penRound=0,penDone=false;
let offQ=[],offI=0,offC=0,offDone=false;

function ld(){try{const s=localStorage.getItem('fg1');if(s){const d=JSON.parse(s);cs=d.c||{};dd=d.d||{};qa=d.q||{};passed=d.p||{};streak=d.st||{c:0,l:'',b:0};sBest=d.sb||Infinity;deepA=d.da||{};tLog=d.tl||[];wrongT=d.wt||{};userName=d.un||''}}catch(e){}}
function sv(){try{localStorage.setItem('fg1',JSON.stringify({c:cs,d:dd,q:qa,p:passed,st:streak,sb:sBest,da:deepA,tl:tLog,wt:wrongT,un:userName}))}catch(e){}}
function rst(){if(confirm('Reset ALL progress?')){localStorage.removeItem('fg1');location.reload()}}
ld();
if(userName)V='home';

function ul(i){return i===0||!!passed[CH[i-1].id]}
function qsc(cid){const c=CH.find(x=>x.id===cid);if(!c?.quiz)return{d:0,ok:0,t:0};let d=0,ok=0;c.quiz.forEach((_,i)=>{const k=cid+'-'+i;if(qa[k]!==undefined){d++;if(qa[k]===c.quiz[i].c)ok++}});return{d,ok,t:c.quiz.length}}
function gp(){let t=0,d=0;CH.forEach(c=>{t+=c.steps.length+2;d+=(cs[c.id]||[]).length+(dd[c.id+'-p']?1:0)+(dd[c.id+'-s']?1:0)});return Math.round((d/t)*100)}
function allP(){return CH.every(x=>!!passed[x.id])}
function dTip(){const t=CH.map(c=>c.tip).filter(Boolean);return t[Math.floor(Date.now()/(864e5))%t.length]}
function conf(){const cl=['#16a34a','#f59e0b','#3b82f6','#ef4444','#8b5cf6','#ec4899'];for(let i=0;i<35;i++){const e=document.createElement('div');e.className='conf';e.style.cssText=`left:${Math.random()*100}%;background:${cl[i%cl.length]};animation-delay:${Math.random()*.4}s;animation-duration:${2+Math.random()}s`;document.body.appendChild(e);setTimeout(()=>e.remove(),3500)}}

function ts(id,i){if(!cs[id])cs[id]=[];const a=cs[id],x=a.indexOf(i);x===-1?a.push(i):a.splice(x,1);sv();rn(1)}
function tdr(k){dd[k]=!dd[k];sv();rn(1)}
function nv(i){if(i===ac||i<0||i>=CH.length||!ul(i))return;sDir=i>ac?'l':'r';ac=i;sn=0;V='ch';rn();document.getElementById('ct')?.scrollTo({top:0})}
function aq2(ci,qi,ai){const k=ci+'-'+qi;if(qa[k]!==undefined)return;qa[k]=ai;const c=CH.find(x=>x.id===ci);if(ai!==c.quiz[qi].c)wrongT[k]={correct:c.quiz[qi].a[c.quiz[qi].c],typed:false};
const s=qsc(ci);if(s.d===s.t&&s.ok===s.t){passed[ci]=true;conf()}sv();rn(1)}
function typeC(k){const inp=document.getElementById('ti-'+k);if(!inp)return;const v=inp.value.trim().toLowerCase(),t=(wrongT[k]?.correct||'').toLowerCase();if(v.length>=3&&t.includes(v)){wrongT[k].typed=true;sv();rn(1)}}
function rq(ci){CH.find(x=>x.id===ci)?.quiz?.forEach((_,i)=>{delete qa[ci+'-'+i];delete wrongT[ci+'-'+i]});delete passed[ci];sv();rn(1)}
function saveDeep(key){const el=document.getElementById('deep-'+key);if(el){deepA[key]=el.value;sv()}}
function logTrain(){const t=new Date().toDateString();if(streak.l===t)return;streak.l===new Date(Date.now()-864e5).toDateString()?streak.c++:streak.c=1;streak.l=t;if(streak.c>streak.b)streak.b=streak.c;sv();rn()}
function saveTLog(){const w=document.getElementById('log-w')?.value||'',f=document.getElementById('log-f')?.value||'',n=document.getElementById('log-n')?.value||'';if(!w&&!f&&!n)return;tLog.unshift({d:new Date().toLocaleDateString(),w,f,n});if(tLog.length>20)tLog.pop();sv();rn(1)}
function setName(){const el=document.getElementById('pname');if(el&&el.value.trim()){userName=el.value.trim();V='home';sv();rn()}}

function rn(keep){const ct=document.getElementById('ct');if(keep&&ct)sp=ct.scrollTop;const a=document.getElementById('app');let h='';
if(V==='name')h=rName();else if(V==='home')h=rHome();else if(V==='ch')h=rCh();else if(V==='stats')h=rStats();
else if(V==='pre')h=rPre();else if(V==='post')h=rPost();else if(V==='daily')h=rDaily();
else if(V==='match')h=rMatch();else if(V==='speed')h=rSpeed();
else if(V==='penalty')h=rPenalty();else if(V==='offside')h=rOffside();
a.innerHTML=h;if(keep&&V==='ch'){const c2=document.getElementById('ct');if(c2)c2.scrollTop=sp}}

function rName(){return`<div class="name-screen"><div style="font-size:60px;margin-bottom:10px">⚽</div><h1>Your Football Guide</h1><p style="font-size:12px;color:var(--muted);font-weight:600;margin:8px 0">The complete interactive training guide</p><input id="pname" placeholder="Enter your name..." autofocus><button onclick="setName()">Let's Go! ⚽</button></div>`}

function rHome(){const p=gp(),today=new Date().toDateString(),trained=streak.l===today,tip=dTip();
let h=`<div style="flex:1;overflow-y:auto"><div class="home">`;
h+=`<div class="hello">Hi ${userName}! ⚽</div><div class="sub">Let's become a better footballer</div>`;
if(allP())h+=`<div class="capy"><div class="em">🏆⚽🏆</div><h2>ALL CHAPTERS COMPLETE!</h2><p>You've mastered everything. Now go show it on the pitch!</p></div>`;
h+=`<div class="gc streak-box"><div><div class="streak-n">🔥 ${streak.c}</div></div><div class="streak-i">day streak<br>Best: ${streak.b}</div><button class="streak-b ${trained?'dn':''}" onclick="${trained?'':'logTrain()'}">${trained?'✅ Done!':'Trained today!'}</button></div>`;
h+=`<div class="gc"><div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:10px;color:var(--accent);margin-bottom:3px">💡 TIP OF THE DAY</div><div style="font-size:11px;font-weight:600;line-height:1.5;color:#444">${tip}</div></div>`;
h+=`<div class="gc" style="text-align:center"><div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:11px;color:var(--accent);margin-bottom:4px">${Object.keys(passed).length}/${CH.length} chapters passed</div><div style="background:#e4e4e7;border-radius:6px;height:8px;overflow:hidden"><div style="background:var(--accent);height:100%;width:${Object.keys(passed).length/CH.length*100}%;border-radius:6px"></div></div></div>`;
h+=`<div class="grid">`;
h+=`<div class="gcard" onclick="V='ch';ac=0;rn()"><div class="em">📖</div><div class="nm">Chapters</div><div class="ds">${Object.keys(passed).length} passed</div></div>`;
h+=`<div class="gcard" onclick="V='daily';startDaily();rn()"><div class="em">🧠</div><div class="nm">Daily Drill</div><div class="ds">5 random Qs</div></div>`;
h+=`<div class="gcard" onclick="V='match';startMG();rn()"><div class="em">🎯</div><div class="nm">Skill Match</div></div>`;
h+=`<div class="gcard" onclick="V='speed';startSQ();rn()"><div class="em">⏱️</div><div class="nm">Speed Quiz</div><div class="ds">${sBest<Infinity?(sBest/1000).toFixed(1)+'s':'--'}</div></div>`;
h+=`<div class="gcard" onclick="V='penalty';startPen();rn()"><div class="em">🥅</div><div class="nm">Penalty Shootout</div></div>`;
h+=`<div class="gcard" onclick="V='offside';startOff();rn()"><div class="em">📐</div><div class="nm">Offside Challenge</div></div>`;
h+=`<div class="gcard" onclick="V='pre';rn()"><div class="em">🚗</div><div class="nm">Pre-Training</div></div>`;
h+=`<div class="gcard" onclick="V='post';rn()"><div class="em">📝</div><div class="nm">Training Log</div><div class="ds">${tLog.length} entries</div></div>`;
h+=`<div class="gcard" onclick="V='stats';rn()"><div class="em">📊</div><div class="nm">Stats</div></div>`;
h+=`<div class="gcard" onclick="rst()"><div class="em">🔄</div><div class="nm">Reset</div></div>`;
h+=`</div></div></div>`;return h}
